      - heading "Smartphone notifications" [level=3] [ref=e735]
      - generic [ref=e737]:
        - paragraph [ref=e738]: Smartphone notifications are supported on both iOS and Android devices. Your Core / Spark will mirror the notifications you receive on your mobile device and is compatible with all apps. At this time, it is not possible to enable or disable notifications for individual apps independently from your mobile device settings.
        - paragraph [ref=e739]: For notifications to work reliably, your wearable must be connected through the Soundbrenner app, not just visible in your phone's Bluetooth settings.
        - paragraph [ref=e740]: To receive notifications, iOS and Android require certain permissions. When you connect your device to the Soundbrenner app for the first time, these permissions will be requested automatically during setup.
        - paragraph [ref=e741]: On Android, make sure notification access and background activity are enabled. On iPhone, make sure notification permissions are granted and Bluetooth remains enabled.
