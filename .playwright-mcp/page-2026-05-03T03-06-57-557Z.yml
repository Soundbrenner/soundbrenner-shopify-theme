        - heading "Circle of fifths" [level=2] [ref=e637]
      - heading "Using the circle on Core 2 / Spark" [level=3] [ref=e638]
      - generic [ref=e640]:
        - paragraph [ref=e641]:
          - text: The
          - strong [ref=e642]: Circle of fifths
          - text: is a music theory tool that shows how keys, chords, and scales relate to each other. Neighboring keys on the circle share nearly all of the same notes, which is why they often sound natural together.
        - paragraph [ref=e643]: On Core 2 / Spark, the feature gives you a quick reference while practicing, composing, or learning a song.
      - heading "Read the screen" [level=3] [ref=e644]
      - generic [ref=e646]:
        - paragraph [ref=e647]: The top of the screen shows related chords from the current area of the circle. Major chords appear on the top row and minor chords appear below them. The currently selected key is marked with a small rectangle.
        - paragraph [ref=e648]: The lower part of the screen shows the notes in the selected scale. For example, C major shows C D E F G A B C, while A minor shows A B C D E F G A.
      - heading "Navigate the circle" [level=3] [ref=e649]
      - generic [ref=e651]:
        - paragraph [ref=e652]: Rotate the wheel to move left or right around the circle. Moving clockwise follows fifths and adds sharps to the key signature. Moving counter-clockwise follows flats.
        - paragraph [ref=e653]: Press the bottom button to switch the focus between the major and minor rows.
        - heading "Tip" [level=4] [ref=e654]
        - paragraph [ref=e655]: Use nearby chords as a starting point when writing progressions. They are closely related to the selected key and usually feel cohesive together.
      - heading "F♯ and G♭" [level=3] [ref=e656]
      - generic [ref=e658]:
        - paragraph [ref=e659]: At the bottom of the circle, F♯ and G♭ share the same position. They sound the same but are written differently, which is called an enharmonic equivalent.
        - paragraph [ref=e660]: Core 2 / Spark shows F♯ when you arrive from the sharp side and G♭ when you arrive from the flat side. A dotted line marks this transition.
