        - paragraph [ref=e717]:
          - strong [ref=e718]: Volume alarm
        - paragraph [ref=e719]: "Your Core / Spark monitors sound exposure throughout the day and alerts you when volume levels reach potentially harmful thresholds, based on World Health Organization guidelines:"
