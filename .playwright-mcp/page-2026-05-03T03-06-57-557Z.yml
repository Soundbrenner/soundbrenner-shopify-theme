        - paragraph [ref=e692]: Each magnetic tuner mount comes with pre-applied adhesive. Remove the protective backing and firmly attach the mount to the headstock of your instrument.
        - paragraph [ref=e693]: The tuner mount is designed for long-term use, so you do not need to remove it after each session. If you decide to remove it, peel it off carefully to avoid damaging the surface of your instrument.
